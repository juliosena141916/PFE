<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <title>Instagram Grid Layout</title>
    <link rel="stylesheet" href="inta.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</head>

<body>

    <div class="container">

        <aside class="sidebar">
            <div class="logo">Instagram</div>

            <div class="menu">
                <div><img src="icons/home.png" alt="">Home</div>
                <div><img src="icons/search.png" alt="">Pesquisar</div>
                <div><img src="icons/play.png" alt="">Reels</div>
                <div><img src="icons/add.png" alt="Criar">Criar</div>
                <div><img src="icons/perfil.png" alt="Perfil">Perfil</div>
            </div>
        </aside>


        <main class="feed">


            <div class="stories">

                <div class="story">
                    <div class="story-avatar">
                        <img src="https://i.pravatar.cc/60?img=5" alt="usuario1">
                    </div>
                    usuario1
                </div>

                <div class="story">
                    <div class="story-avatar">
                        <img src="https://i.pravatar.cc/60?img=6" alt="usuario2">
                    </div>
                    usuario2
                </div>

                <div class="story">
                    <div class="story-avatar">
                        <img src="https://i.pravatar.cc/60?img=7" alt="usuario3">
                    </div>
                    usuario3
                </div>

                <div class="story">
                    <div class="story-avatar">
                        <img src="https://i.pravatar.cc/60?img=8" alt="usuario4">
                    </div>
                    usuario4
                </div>

                <div class="story">
                    <div class="story-avatar">
                        <img src="https://i.pravatar.cc/60?img=9" alt="usuario5">
                    </div>
                    usuario5
                </div>

            </div>


            <div class="post">
                <div class="post-header">usuario_1</div>
                <div class="post-img"
                    style="background-image:url('https://picsum.photos/470/470?random=1'); background-size:cover;">
                </div>
                <div class="post-actions"><img src="icons/heart.png" alt=""> <img src="icons/chat.png" alt=""> <img
                        src="icons/send.png" alt=""></div>
                <div class="post-caption">
                    <b>usuario_1</b> Menssagem muito legal
                </div>
            </div>

            <div class="post">
                <div class="post-header">usuario_2</div>

                <div id="carouselUsuario2" class="carousel slide" data-bs-ride="carousel">
                    <div class="carousel-inner">
                        <div class="carousel-item active">
                            <img src="https://picsum.photos/470/470?random=21" class="d-block w-100" alt="Imagem 1">
                        </div>
                        <div class="carousel-item">
                            <img src="https://picsum.photos/470/470?random=22" class="d-block w-100" alt="Imagem 2">
                        </div>
                        <div class="carousel-item">
                            <img src="https://picsum.photos/470/470?random=23" class="d-block w-100" alt="Imagem 3">
                        </div>
                    </div>

                    <button class="carousel-control-prev" type="button" data-bs-target="#carouselUsuario2"
                        data-bs-slide="prev">
                        <span class="carousel-control-prev-icon" aria-hidden="true"></span>
                        <span class="visually-hidden">Anterior</span>
                    </button>
                    <button class="carousel-control-next" type="button" data-bs-target="#carouselUsuario2"
                        data-bs-slide="next">
                        <span class="carousel-control-next-icon" aria-hidden="true"></span>
                        <span class="visually-hidden">Próximo</span>
                    </button>
                </div>

                <div class="post-actions">
                    <img src="icons/heart.png" alt="">
                    <img src="icons/chat.png" alt="">
                    <img src="icons/send.png" alt="">
                </div>
                <div class="post-caption">
                    <b>usuario_2</b> Mensagem não tão legal
                </div>
            </div>

            <div class="post post-video-container">
                <video class="w-100" controls autoplay muted loop playsinline>
                    <source src="relogio.mp4" type="video/mp4">
                </video>

                <div class="post-actions">
                    <img src="icons/heart.png" alt="">
                    <img src="icons/chat.png" alt="">
                    <img src="icons/send.png" alt="">
                </div>
                <div class="post-caption">
                    <b>usuario_3</b> Mensagem 
                </div>
            </div>

        </main>


        <aside class="right">

            <div class="profile">
                <div class="avatar">
                    <img src="https://i.pravatar.cc/50?img=10" alt="seu_usuario">
                </div>
                <div>
                    <b>Usuario_Principal</b><br>
                    <small>Ana</small>
                </div>
            </div>

            <div class="suggestions">
                <b>Sugestões</b>

                <div class="suggestion">
                    <div class="small-avatar">
                        <img src="https://i.pravatar.cc/40?img=11" alt="usuario_3">
                    </div>
                    Carlos
                </div>

                <div class="suggestion">
                    <div class="small-avatar">
                        <img src="https://i.pravatar.cc/40?img=12" alt="usuario_4">
                    </div>
                    Pedro
                </div>

            </div>

        </aside>

    </div>

</body>

</html>
